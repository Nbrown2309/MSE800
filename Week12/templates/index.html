<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Image Viewer</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #e8ffe8;
            text-align: center;
            padding-top: 40px;
        }

        h1{
            color: darkgreen;
        }

        img{
            width: 500px;
            border: 4px solid darkgreen;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>Flask Image Viewer</h1>

    <p>This image is loaded from the local static folder.</p>

    <img src="{{ url_for('static', filename='image.jpg') }}" alt="Local Image">

</body>
</html>
